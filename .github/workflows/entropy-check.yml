name: Scheduled Entropy Check

on:
  schedule:
    - cron: '0 9 * * 1'  # Every Monday 9:00 UTC
  workflow_dispatch:       # Manual trigger

jobs:
  entropy-management:
    name: Entropy Management
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: 'maven'

      - name: Full build
        run: mvn clean install -B

      - name: Checkstyle check
        run: mvn checkstyle:check -B

      - name: Run entropy check
        id: entropy
        run: |
          chmod +x scripts/entropy-check.sh
          ./scripts/entropy-check.sh 2>&1 | tee entropy-output.txt
        continue-on-error: true

      - name: Create issue on failure
        if: steps.entropy.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('entropy-output.txt', 'utf8');

            // Extract FAIL and WARN lines for structured summary
            const failLines = output.split('\n').filter(l => l.includes('FAIL'));
            const warnLines = output.split('\n').filter(l => l.includes('WARN'));

            let body = `## Entropy Check Failed\n\n`;
            body += `**Date**: ${new Date().toISOString().split('T')[0]}\n\n`;

            if (failLines.length > 0) {
              body += `### ❌ Failures (must fix)\n`;
              failLines.forEach(l => { body += `- ${l.replace(/\x1b\[[0-9;]*m/g, '').trim()}\n`; });
              body += `\n`;
            }

            if (warnLines.length > 0) {
              body += `### ⚠️ Warnings\n`;
              warnLines.forEach(l => { body += `- ${l.replace(/\x1b\[[0-9;]*m/g, '').trim()}\n`; });
              body += `\n`;
            }

            body += `### Fix Guide\n`;
            body += `- **Domain purity**: Remove Spring/MyBatis imports from \`claude-j-domain\`\n`;
            body += `- **Dependency direction**: Check import statements across layers\n`;
            body += `- **Java 8 compat**: Replace \`var\`, \`List.of()\`, \`Map.of()\`\n`;
            body += `- **DO leak**: Restrict DO usage to \`claude-j-infrastructure\`\n`;
            body += `- **Knowledge base**: Update broken file references in docs\n\n`;

            body += `<details><summary>Full output</summary>\n\n\`\`\`\n${output.replace(/\x1b\[[0-9;]*m/g, '')}\n\`\`\`\n</details>`;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Entropy] Architecture drift detected - ${new Date().toISOString().split('T')[0]}`,
              body,
              labels: ['entropy', 'automated']
            });
