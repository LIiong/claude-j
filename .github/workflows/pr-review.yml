name: PR Review

on:
  pull_request:
    types: [ opened, synchronize, reopened ]

jobs:
  label:
    name: Auto Label
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Label by changed paths
        uses: actions/github-script@v7
        with:
          script: |
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });

            const labels = new Set();
            for (const file of files) {
              if (file.filename.startsWith('claude-j-domain/')) labels.add('layer:domain');
              if (file.filename.startsWith('claude-j-application/')) labels.add('layer:application');
              if (file.filename.startsWith('claude-j-infrastructure/')) labels.add('layer:infrastructure');
              if (file.filename.startsWith('claude-j-adapter/')) labels.add('layer:adapter');
              if (file.filename.startsWith('claude-j-start/')) labels.add('layer:start');
              if (file.filename.startsWith('docs/')) labels.add('docs');
              if (file.filename.endsWith('Test.java')) labels.add('tests');
            }

            if (labels.size > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: [...labels]
              });
            }
