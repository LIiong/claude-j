spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:test_db;DB_CLOSE_DELAY=-1;MODE=MySQL
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  flyway:
    enabled: true
    locations: classpath:db/migration-h2
    baseline-on-migrate: true
    validate-on-migrate: false
    clean-disabled: false

jwt:
  secret: test-jwt-secret-key-for-start-tests-32-bytes-long

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,env,liveness,readiness
      base-path: /actuator
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
      group:
        liveness:
          include: livenessState
        readiness:
          include: readinessState,db
    metrics:
      enabled: true
    env:
      enabled: true
    info:
      enabled: true