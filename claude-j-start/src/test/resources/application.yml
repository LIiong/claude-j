spring:
  profiles:
    active: test
  datasource:
    url: jdbc:h2:mem:test_db;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  flyway:
    enabled: true
    locations: classpath:db/migration-h2
    baseline-on-migrate: true
    validate-on-migrate: false
    clean-disabled: false
    out-of-order: true

jwt:
  secret: test-jwt-secret-key-for-start-tests-32-bytes-long

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,env,liveness,readiness,prometheus
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
      group:
        liveness:
          include: livenessState
        readiness:
          include: readinessState,db
    metrics:
      enabled: true
    info:
      enabled: true
