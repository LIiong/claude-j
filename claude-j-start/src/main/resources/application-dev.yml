spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:claude_j;DB_CLOSE_DELAY=-1;MODE=MySQL
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

jwt:
  secret: dev-jwt-secret-key-at-least-32-bytes-for-local

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,env,liveness,readiness
      base-path: /actuator
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
      group:
        liveness:
          include: livenessState
        readiness:
          include: readinessState,db
    metrics:
      enabled: true
    env:
      enabled: true
    info:
      enabled: true

app:
  security:
    cors:
      enabled: true
      allowed-origins:
        - http://localhost:3000
        - http://127.0.0.1:3000
        - http://localhost:5173
        - http://127.0.0.1:5173

