server:
  port: 8080

spring:
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
  lifecycle:
    timeout-per-shutdown-phase: 30s

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: ${JWT_SECRET:}
  access-token-expiration: 60  # Access Token 有效期（分钟）
  refresh-token-expiration: 7  # Refresh Token 有效期（天）

logging:
  level:
    com.claudej: debug

management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health,info,metrics,env,liveness,readiness,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
      group:
        liveness:
          include: livenessState
        readiness:
          include: readinessState,db
    info:
      enabled: true

app:
  security:
    cors:
      enabled: false
      allow-credentials: true
      max-age: 1800
      allowed-origins: []
      allowed-methods:
        - GET
        - POST
        - PUT
        - DELETE
        - PATCH
        - OPTIONS
      allowed-headers:
        - Authorization
        - Content-Type
        - Accept
        - Origin
