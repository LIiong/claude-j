server:
  port: 8080

spring:
  profiles:
    active: dev
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: claude-j-secret-key-at-least-32-bytes-for-hs256-algorithm
  access-token-expiration: 60  # Access Token 有效期（分钟）
  refresh-token-expiration: 7  # Refresh Token 有效期（天）

logging:
  level:
    com.claudej: debug
