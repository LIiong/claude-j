version: '3.8'

services:
  app:
    build:
      context: ../..
      dockerfile: docs/devops/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
    depends_on:
      - mysql
    networks:
      - claude-j-net

  mysql:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: claude_j
      MYSQL_USER: claudej
      MYSQL_PASSWORD: claudej
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - claude-j-net

volumes:
  mysql-data:

networks:
  claude-j-net:
    driver: bridge
